user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Nginx limits for extra security
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost; # Thay bằng domain thực tế khi deploy lên server thật

        # Chặn truy cập trực tiếp bằng IP nếu muốn chặt chẽ (tùy chọn)

        location / {
            # Route to Streamlit
            proxy_pass http://frontend:8501;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket support for Streamlit
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location /api/ {
            # Route to API Server
            # Rewrite /api/chat -> /chat
            rewrite ^/api/(.*) /$1 break;
            
            proxy_pass http://api-server:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Limit request per second for API (Anti-Spam basic)
            limit_req zone=mylimit burst=20 nodelay;
        }
    }
}
